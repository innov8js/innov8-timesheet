<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Innov8 Weekly Timesheet</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 15px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      font-size: 16px;
      box-sizing: border-box;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #111;
      color: white;
    }

    .total {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
      text-align: right;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      margin-top: 20px;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    @media (max-width: 700px) {
      table {
        font-size: 12px;
      }

      th, td {
        padding: 5px;
      }

      select {
        font-size: 12px;
        padding: 6px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Innov8 Weekly Timesheet</h1>

    <label>Worker Name</label>
    <input type="text" id="workerName" placeholder="Enter worker name">
<label>Company Name</label>
<select id="companyName">
  <option value="">Select Company</option>
  <option value="I&M Joinery">I&M Joinery</option>
  <option value="Innov8 Labour Solutions">Innov8 Labour Solutions</option>
  <option value="Other">Other</option>
</select>

<label>Job Site / Address</label>
<input type="text" id="jobSite" placeholder="Enter site name or address">
    <label>Week Starting Monday</label>
    <input type="date" id="weekStart" onchange="updateDates()">

    <table>
      <thead>
        <tr>
          <th>Day / Date</th>
          <th>Start Time</th>
          <th>Finish Time</th>
          <th>Break</th>
          <th>Hours</th>
        </tr>
      </thead>
      <tbody id="timesheetBody"></tbody>
    </table>

    <div class="total">
      Total Hours: <span id="totalHours">0.00</span>
    </div>

    <button onclick="generatePDF()">Generate PDF</button>
  </div>

  <script>
    const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

    function createTimeOptions() {
      let options = '<option value="">--</option>';

      for (let h = 0; h < 24; h++) {
        for (let m = 0; m < 60; m += 15) {
          const value = String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");

          let displayHour = h % 12;
          if (displayHour === 0) displayHour = 12;
          const ampm = h >= 12 ? "PM" : "AM";
          const display = value + " (" + displayHour + ":" + String(m).padStart(2, "0") + " " + ampm + ")";

          options += `<option value="${value}">${display}</option>`;
        }
      }

      return options;
    }

    function formatDate(date) {
      if (!date) return "";
      const d = String(date.getDate()).padStart(2, "0");
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const y = date.getFullYear();
      return `${d}/${m}/${y}`;
    }

    function loadTable() {
      const tbody = document.getElementById("timesheetBody");
      const timeOptions = createTimeOptions();

      tbody.innerHTML = "";

      days.forEach((day, index) => {
        tbody.innerHTML += `
          <tr>
            <td class="dayDate" data-index="${index}">${day}</td>
            <td><select class="start" onchange="calculateHours()">${timeOptions}</select></td>
            <td><select class="finish" onchange="calculateHours()">${timeOptions}</select></td>
            <td>
              <select class="breakOption" onchange="calculateHours()">
                <option value="yes">30 min</option>
                <option value="no">No Break</option>
              </select>
            </td>
            <td class="hours">0.00</td>
          </tr>
        `;
      });
    }

    function updateDates() {
      const weekStartValue = document.getElementById("weekStart").value;
      if (!weekStartValue) return;

      const startDate = new Date(weekStartValue + "T00:00:00");

      document.querySelectorAll(".dayDate").forEach(cell => {
        const index = Number(cell.dataset.index);
        const date = new Date(startDate);
        date.setDate(startDate.getDate() + index);

        cell.textContent = `${days[index]} ${formatDate(date)}`;
      });
    }

    function timeToMinutes(time) {
      if (!time) return null;
      const parts = time.split(":");
      return Number(parts[0]) * 60 + Number(parts[1]);
    }

    function calculateHours() {
      let total = 0;

      document.querySelectorAll("#timesheetBody tr").forEach(row => {
        const start = row.querySelector(".start").value;
        const finish = row.querySelector(".finish").value;
        const breakOption = row.querySelector(".breakOption").value;
        const hoursCell = row.querySelector(".hours");

        const startMin = timeToMinutes(start);
        const finishMin = timeToMinutes(finish);

        if (startMin !== null && finishMin !== null && finishMin > startMin) {
          let workedMinutes = finishMin - startMin;

          if (breakOption === "yes") {
            workedMinutes -= 30;
          }

          if (workedMinutes < 0) workedMinutes = 0;

          const hours = workedMinutes / 60;
          hoursCell.textContent = hours.toFixed(2);
          total += hours;
        } else {
          hoursCell.textContent = "0.00";
        }
      });

      document.getElementById("totalHours").textContent = total.toFixed(2);
    }

    function generatePDF() {
      calculateHours();
      function generatePDF() {
  calculateHours();

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const workerName = document.getElementById("workerName").value || "Worker";
  const companyName = document.getElementById("companyName").value || "-";
  const jobSite = document.getElementById("jobSite").value || "-";
  const weekStart = document.getElementById("weekStart").value || "-";
  const totalHours = document.getElementById("totalHours").textContent;

  doc.setFillColor(20, 20, 20);
  doc.rect(0, 0, 210, 32, "F");

  doc.setTextColor(255, 255, 255);
  doc.setFontSize(20);
  doc.text("INNOV8 WEEKLY TIMESHEET", 20, 21);

  doc.setTextColor(0, 0, 0);

  doc.setDrawColor(180, 180, 180);
  doc.roundedRect(15, 40, 180, 38, 3, 3);

  doc.setFontSize(11);
  doc.text("Worker Name: " + workerName, 20, 50);
  doc.text("Company Name: " + companyName, 20, 59);
  doc.text("Job Site / Address: " + jobSite, 20, 68);
  doc.text("Week Starting: " + weekStart, 120, 50);

  let y = 92;

  doc.setFillColor(20, 20, 20);
  doc.rect(15, y - 7, 180, 10, "F");

  doc.setTextColor(255, 255, 255);
  doc.setFontSize(10);
  doc.text("Day / Date", 20, y);
  doc.text("Start", 75, y);
  doc.text("Finish", 105, y);
  doc.text("Break", 135, y);
  doc.text("Hours", 165, y);

  doc.setTextColor(0, 0, 0);
  y += 8;

  document.querySelectorAll("#timesheetBody tr").forEach(row => {
    const dayDate = row.querySelector(".dayDate").textContent;
    const start = row.querySelector(".start").value || "-";
    const finish = row.querySelector(".finish").value || "-";
    const breakText = row.querySelector(".breakOption").value === "yes" ? "30 min" : "No Break";
    const hours = row.querySelector(".hours").textContent;

    doc.setDrawColor(220, 220, 220);
    doc.rect(15, y - 6, 180, 9);

    doc.setFontSize(10);
    doc.text(dayDate, 20, y);
    doc.text(start, 75, y);
    doc.text(finish, 105, y);
    doc.text(breakText, 135, y);
    doc.text(hours, 165, y);

    y += 9;
  });

  y += 10;

  doc.setFillColor(240, 240, 240);
  doc.roundedRect(115, y - 8, 80, 16, 3, 3, "F");

  doc.setFontSize(14);
  doc.text("Total Hours: " + totalHours, 120, y + 2);

  y += 35;

  doc.setFontSize(11);
  doc.text("Worker Signature: ______________________________", 20, y);
  y += 16;
  doc.text("Supervisor Signature: ___________________________", 20, y);

  doc.setFontSize(9);
  doc.setTextColor(120, 120, 120);
  doc.text("Generated by Innov8 Labour Solutions", 20, 285);

  doc.save(workerName + "-weekly-timesheet.pdf");
}
loadTable();
</script>

</body>

</html>
