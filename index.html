<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Timesheet</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 15px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      font-size: 15px;
      box-sizing: border-box;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: center;
    }

    th {
      background: #111;
      color: white;
    }

    .notesInput {
      min-width: 150px;
    }

    .total {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
      text-align: right;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      margin-top: 20px;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    @media (max-width: 700px) {
      table {
        font-size: 11px;
      }

      th, td {
        padding: 4px;
      }

      select, input {
        font-size: 11px;
        padding: 6px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Weekly Timesheet</h1>

    <label>Worker Name</label>
    <input type="text" id="workerName" placeholder="Enter worker name">

    <label>Company Name</label>
    <select id="companyName" onchange="toggleOtherCompany()">
      <option value="">Select Company</option>
      <option value="I&M Joinery">I&M Joinery</option>
      <option value="Innov8 Labour Solutions">Innov8 Labour Solutions</option>
      <option value="Other">Other</option>
    </select>

    <div id="otherCompanyBox" style="display:none;">
      <label>Other Company Name</label>
      <input type="text" id="otherCompanyName" placeholder="Enter company name">
    </div>

    <label>Week Starting Monday</label>
    <input type="date" id="weekStart" onchange="updateDates()">

    <table>
      <thead>
        <tr>
          <th>Day / Date</th>
          <th>Job Site / Notes</th>
          <th>Start Time</th>
          <th>Finish Time</th>
          <th>Break</th>
          <th>Hours</th>
        </tr>
      </thead>
      <tbody id="timesheetBody"></tbody>
    </table>

    <div class="total">
      Total Hours: <span id="totalHours">0.00</span>
    </div>

    <button onclick="generatePDF()">Generate PDF</button>
  </div>

  <script>
    const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

    function toggleOtherCompany() {
      const company = document.getElementById("companyName").value;
      document.getElementById("otherCompanyBox").style.display = company === "Other" ? "block" : "none";
    }

    function getCompanyName() {
      const company = document.getElementById("companyName").value;
      if (company === "Other") {
        return document.getElementById("otherCompanyName").value || "Other Company";
      }
      return company || "Company";
    }

    function createTimeOptions() {
      let options = '<option value="">--</option>';

      for (let h = 0; h < 24; h++) {
        for (let m = 0; m < 60; m += 15) {
          const value = String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");

          let displayHour = h % 12;
          if (displayHour === 0) displayHour = 12;
          const ampm = h >= 12 ? "PM" : "AM";
          const display = displayHour + ":" + String(m).padStart(2, "0") + " " + ampm;

          options += `<option value="${value}">${display}</option>`;
        }
      }

      return options;
    }

    function formatDate(date) {
      const d = String(date.getDate()).padStart(2, "0");
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const y = date.getFullYear();
      return `${d}/${m}/${y}`;
    }

    function loadTable() {
      const tbody = document.getElementById("timesheetBody");
      const timeOptions = createTimeOptions();

      tbody.innerHTML = "";

      days.forEach((day, index) => {
        tbody.innerHTML += `
          <tr>
            <td class="dayDate" data-index="${index}">${day}</td>
            <td><input class="notesInput" type="text" placeholder="Site / notes"></td>
            <td><select class="start" onchange="calculateHours()">${timeOptions}</select></td>
            <td><select class="finish" onchange="calculateHours()">${timeOptions}</select></td>
            <td>
              <select class="breakOption" onchange="calculateHours()">
                <option value="30">30 min</option>
                <option value="0">No Break</option>
              </select>
            </td>
            <td class="hours">0.00</td>
          </tr>
        `;
      });
    }

    function updateDates() {
      const weekStartValue = document.getElementById("weekStart").value;
      if (!weekStartValue) return;

      const startDate = new Date(weekStartValue + "T00:00:00");

      document.querySelectorAll(".dayDate").forEach(cell => {
        const index = Number(cell.dataset.index);
        const date = new Date(startDate);
        date.setDate(startDate.getDate() + index);
        cell.textContent = `${days[index]} ${formatDate(date)}`;
      });
    }

    function timeToMinutes(time) {
      if (!time) return null;
      const parts = time.split(":");
      return Number(parts[0]) * 60 + Number(parts[1]);
    }

    function calculateHours() {
      let total = 0;

      document.querySelectorAll("#timesheetBody tr").forEach(row => {
        const start = row.querySelector(".start").value;
        const finish = row.querySelector(".finish").value;
        const breakMinutes = Number(row.querySelector(".breakOption").value);
        const hoursCell = row.querySelector(".hours");

        const startMin = timeToMinutes(start);
        const finishMin = timeToMinutes(finish);

        if (startMin !== null && finishMin !== null && finishMin > startMin) {
          let workedMinutes = finishMin - startMin - breakMinutes;
          if (workedMinutes < 0) workedMinutes = 0;

          const hours = workedMinutes / 60;
          hoursCell.textContent = hours.toFixed(2);
          total += hours;
        } else {
          hoursCell.textContent = "0.00";
        }
      });

      document.getElementById("totalHours").textContent = total.toFixed(2);
    }

    function generatePDF() {
      calculateHours();

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      const workerName = document.getElementById("workerName").value || "Worker";
      const companyName = getCompanyName();
      const weekStart = document.getElementById("weekStart").value || "-";
      const totalHours = document.getElementById("totalHours").textContent;

      doc.setFillColor(20, 20, 20);
      doc.rect(0, 0, 210, 35, "F");

      doc.setTextColor(255, 255, 255);
      doc.setFontSize(18);
      doc.text(companyName.toUpperCase(), 15, 16);
      doc.setFontSize(14);
      doc.text("WEEKLY TIMESHEET", 15, 27);

      doc.setTextColor(0, 0, 0);
      doc.setFontSize(11);

      doc.roundedRect(15, 43, 180, 30, 3, 3);
      doc.text("Worker Name: " + workerName, 20, 54);
      doc.text("Company Name: " + companyName, 20, 63);
      doc.text("Week Starting: " + weekStart, 125, 54);

      let y = 88;

      doc.setFillColor(20, 20, 20);
      doc.rect(15, y - 7, 180, 10, "F");

      doc.setTextColor(255, 255, 255);
      doc.setFontSize(9);
      doc.text("Day / Date", 18, y);
      doc.text("Site / Notes", 55, y);
      doc.text("Start", 105, y);
      doc.text("Finish", 130, y);
      doc.text("Break", 155, y);
      doc.text("Hours", 180, y);

      doc.setTextColor(0, 0, 0);
      y += 8;

      document.querySelectorAll("#timesheetBody tr").forEach(row => {
        const dayDate = row.querySelector(".dayDate").textContent;
        const notes = row.querySelector(".notesInput").value || "-";
        const start = row.querySelector(".start").value || "-";
        const finish = row.querySelector(".finish").value || "-";
        const breakText = row.querySelector(".breakOption").value === "30" ? "30 min" : "No Break";
        const hours = row.querySelector(".hours").textContent;

        doc.setDrawColor(220, 220, 220);
        doc.rect(15, y - 6, 180, 9);

        doc.setFontSize(8);
        doc.text(dayDate, 18, y);
        doc.text(notes.substring(0, 25), 55, y);
        doc.text(start, 105, y);
        doc.text(finish, 130, y);
        doc.text(breakText, 155, y);
        doc.text(hours, 180, y);

        y += 9;
      });

      y += 12;

      doc.setFillColor(240, 240, 240);
      doc.roundedRect(115, y - 8, 80, 16, 3, 3, "F");

      doc.setFontSize(14);
      doc.text("Total Hours: " + totalHours, 120, y + 2);

      y += 35;
      doc.setFontSize(11);
      doc.text("Worker Signature: ______________________________", 20, y);
      y += 16;
      doc.text("Supervisor Signature: ___________________________", 20, y);

      doc.setFontSize(9);
      doc.setTextColor(120, 120, 120);
      doc.text("Generated by " + companyName, 20, 285);

      const safeWorker = workerName.replace(/[^a-z0-9]/gi, "_");
      const safeCompany = companyName.replace(/[^a-z0-9]/gi, "_");

      doc.save(safeWorker + "_" + safeCompany + "_Timesheet.pdf");
    }

    loadTable();
  </script>
</body>
</html>
